    description: Default scaffolded hello world project
    commands:
      - cmd: npm install
      - cmd: npm run start.watch
      - cmd: npm run workflow
        new_terminal: true
  - path: nexus-hello
    description: Nexus service definition and cross-namespace calls
    commands:
      - cmd: npm install
      - cmd: temporal operator namespace create --namespace nexus-sample-caller
      - cmd: temporal operator namespace create --namespace nexus-sample-handler
      - cmd: temporal operator nexus endpoint create --name nexus-sample --target-namespace nexus-sample-handler --target-task-queue my-handler-task-queue
      - cmd: npm run start.service.watch
      - cmd: npm run start.caller.watch
        new_terminal: true
      - cmd: npm run workflow
        new_terminal: true
